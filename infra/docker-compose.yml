services:
  postgres:
    image: postgres:16
    container_name: riskapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: riskapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - riskapp_postgres_data:/var/lib/postgresql/data

volumes:
  riskapp_postgres_data: